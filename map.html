<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css">
<title>Flag Fen Audio Tour</title>
</head>
<body class="app">

<header style="text-align: center; margin-bottom: 20px;">
  <h1>Flag Fen Audio Tour</h1>
  <p>Tap a location on the map to listen to the guide.</p>
</header>

<div class="map-container" id="map">
  <img src="FF map no key or symbols high res with new roundhouse.jpg" class="map-image" id="map-img" alt="Flag Fen Site Map">
  <!-- Pins will be injected here -->
</div>

<div class="card" style="margin-top: 24px; text-align: center;">
  <h3>Tour Instructions</h3>
  <p>Follow the numbered points on the map. You can listen to the stops in any order.</p>
</div>

<!-- Visitor Counter -->
<div style="text-align: center; margin: 40px 0 20px 0; opacity: 0.6;">
  <div style="display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; background: #0d1a17; border: 1px solid #1a3d35; border-radius: 50px; font-family: monospace;">
    <span style="color: #ffd700; font-size: 8px; animation: pulse-dot 2s infinite;">●</span>
    <span id="visitor-count" style="color: #7de0c6; font-weight: bold; font-size: 13px;">...</span>
  </div>
</div>

<style>
@keyframes pulse-dot {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}
</style>

<script type="module">
import { STOPS } from "./data.js";
import { getDone, haptic } from "./app.js";

// Visitor Counter Logic
async function updateCounter() {
  const counterId = "flagfen_visited";
  const isNewSession = !sessionStorage.getItem(counterId);
  
  try {
    // Correct URL for "up" increments, while the base URL just "gets" the total.
    const url = isNewSession 
      ? "https://api.counterapi.dev/v1/flagfen-tour/visits/up" 
      : "https://api.counterapi.dev/v1/flagfen-tour/visits/";
    
    const res = await fetch(url);
    const data = await res.json();
    
    document.getElementById("visitor-count").innerText = data.count.toLocaleString();
    
    if (isNewSession) {
      sessionStorage.setItem(counterId, "true");
    }
  } catch (e) {
    document.getElementById("visitor-count").innerText = "---";
  }
}
updateCounter();

const mapDiv = document.getElementById("map");
const doneSlugs = new Set(getDone());

// Custom Guided Order Logic
const orderedStops = [...STOPS].sort((a, b) => a.sequence - b.sequence);
const nextStop = orderedStops.find(s => !doneSlugs.has(s.slug));

STOPS.forEach((s, index) => {
  const pin = document.createElement("a");
  const isDone = doneSlugs.has(s.slug);
  const isNext = nextStop && s.slug === nextStop.slug;
  
  pin.className = "pin";
  if (isDone) pin.classList.add("done");
  if (isNext) pin.classList.add("pulse");
  
  // The label on the pin remains the static ID (1-10)
  pin.innerText = index + 1;
  
  // Set position from data.js
  pin.style.left = s.x + "%";
  pin.style.top = s.y + "%";
  
  pin.href = `stop.html?slug=${s.slug}`;
  pin.onclick = (e) => {
    e.preventDefault();
    haptic(40);
    document.body.classList.add("fade-out");
    setTimeout(() => location.href = pin.href, 400);
  };
  
  mapDiv.appendChild(pin);
});
</script>

</body>
</html>
